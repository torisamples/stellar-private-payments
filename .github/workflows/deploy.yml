name: Build & Deploy to Vercel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: "deploy-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  # Tag for the GitHub Release holding circuit artifacts and proving keys.
  # Bump this when the circuit or trusted-setup outputs change.
  ARTIFACT_RELEASE_TAG: circuit-artifacts-v1

jobs:
  build-and-deploy:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      # ── Checkout ───────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4

      # ── Rust toolchain ─────────────────────────────────────────────────
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Rust cache
        uses: Swatinem/rust-cache@82a92a6e8fbeee089604da2575dc567ae9ddeaab # v2
        with:
          cache-targets: "true"

      # ── JS toolchain ───────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install npm dependencies
        run: cd app && npm ci

      # ── Install build tools ────────────────────────────────────────────
      - name: Install Trunk
        uses: jetli/trunk-action@v0.5.0
        with:
          version: latest

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      # ── Download circuit artifacts from GitHub Release ──────────────────
      # Large binary files (~13 MB) from the trusted setup ceremony and
      # circuit compilation. Stored as release assets since they only change
      # when the circuit itself changes.
      - name: Download circuit artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p artifact-cache
          gh release download "$ARTIFACT_RELEASE_TAG" \
            --dir artifact-cache \
            --skip-existing \
            || { echo "::error::Release '$ARTIFACT_RELEASE_TAG' not found. Create it with: gh release create $ARTIFACT_RELEASE_TAG ./artifacts/*"; exit 1; }
          ls -lh artifact-cache/

      # ── Build WASM modules ─────────────────────────────────────────────
      - name: Build prover WASM
        run: |
          cd app/crates/prover
          wasm-pack build --target web --release --out-dir ../../../target/wasm-prover

      - name: Build witness WASM
        run: |
          cd app/crates/witness
          wasm-pack build --target web --release --out-dir ../../../target/wasm-witness

      # ── Build app with Trunk ───────────────────────────────────────────
      - name: Build with Trunk
        run: trunk build --release
        env:
          CIRCUIT_ARTIFACT_DIR: artifact-cache

      # ── Ensure circuit artifacts are in dist ───────────────────────────
      # Safety net: copy artifacts into dist/ in case Trunk hooks missed any.
      - name: Stage circuit artifacts
        run: |
          mkdir -p dist/circuits dist/keys
          cp artifact-cache/policy_tx_2_2.r1cs           dist/circuits/ 2>/dev/null || true
          cp artifact-cache/policy_tx_2_2.wasm            dist/circuits/ 2>/dev/null || true
          cp artifact-cache/policy_tx_2_2_proving_key.bin dist/keys/     2>/dev/null || true
          cp artifact-cache/policy_tx_2_2_vk.json         dist/keys/     2>/dev/null || true
          cp scripts/deployments.json                     dist/          2>/dev/null || true
          echo "=== dist/ contents ==="
          find dist -type f | sort

      # ── Deploy to Vercel ───────────────────────────────────────────────
      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel project config
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Vercel output (from pre-built dist/)
        run: vercel build ${{ github.ref == 'refs/heads/main' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        id: deploy
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          else
            DEPLOY_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          fi
          echo "url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "### Deployed to $DEPLOY_URL" >> "$GITHUB_STEP_SUMMARY"

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const url = '${{ steps.deploy.outputs.url }}';
            if (url) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `**Preview:** ${url}`
              });
            }
